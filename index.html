<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFund - 습관이 기적이 되는 순간</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow-x: hidden;
            color: #1d1d1f;
        }

        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            color: white;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.95;
            font-weight: 400;
        }

        .app-store-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #000;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .app-store-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            background: #1d1d1f;
        }

        .app-store-button svg {
            width: 24px;
            height: 24px;
        }

        .hero-video-container {
            position: relative;
            animation: fadeInRight 1s ease-out;
            perspective: 1000px;
        }

        .phone-mockup {
            position: relative;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            aspect-ratio: 9 / 19.5;
            background: #1d1d1f;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transform: rotateY(-5deg) rotateX(2deg);
            transition: transform 0.6s ease;
        }

        .phone-mockup:hover {
            transform: rotateY(0deg) rotateX(0deg);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 42px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #1d1d1f;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .hero-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 60px;
                text-align: center;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                font-size: 1.1rem;
            }

            .phone-mockup {
                max-width: 300px;
                transform: none;
            }

            .phone-mockup:hover {
                transform: none;
            }

            .hero {
                padding: 40px 20px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 30px;
            }

            .app-store-button {
                padding: 12px 24px;
                font-size: 1rem;
            }

            .phone-mockup {
                max-width: 260px;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">습관이 기적이 되는 순간</h1>
                <p class="hero-subtitle">
                    HabitFund로 당신의 좋은 습관을 사회적 가치(Impact)로 측정하고, 
                    후원의 기록을 SNS에 멋지게 공유하세요.
                </p>
                <a href="https://apps.apple.com/app/habit-fund/id6740895553" class="app-store-button" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 384 512" fill="currentColor">
                        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
                    </svg>
                    App Store에서 다운로드
                </a>
            </div>

            <div class="hero-video-container">
                <div class="phone-mockup">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <video 
                            class="hero-video" 
                            autoplay 
                            muted 
                            loop 
                            playsinline
                        >
                            <source src="assets/habitfund_preview_part-1.mov" type="video/quicktime">
                            <!-- 브라우저 호환성을 위한 대체 메시지 -->
                            동영상을 재생할 수 없습니다. 최신 브라우저를 사용해주세요.
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
