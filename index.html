<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFund - 습관이 기적이 되는 순간</title>
    <style>
        :root {
            --lang-switch-size: 40px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow-x: hidden;
            color: #1d1d1f;
        }

        .lang-switch {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
        }

        .lang-selector {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 40px 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .lang-selector:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .lang-selector option {
            background: #1d1d1f;
            color: white;
            padding: 10px;
        }

        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            color: white;
            animation: fadeInUp 1s ease-out;
        }

        .hero-content[dir="rtl"] {
            direction: rtl;
            text-align: right;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.95;
            font-weight: 400;
        }

        .app-store-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #000;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .app-store-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            background: #1d1d1f;
        }

        .app-store-button svg {
            width: 24px;
            height: 24px;
        }

        .hero-video-container {
            position: relative;
            animation: fadeInRight 1s ease-out;
            perspective: 1000px;
        }

        .phone-mockup {
            position: relative;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            aspect-ratio: 9 / 19.5;
            background: #1d1d1f;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transform: rotateY(-5deg) rotateX(2deg);
            transition: transform 0.6s ease;
        }

        .phone-mockup:hover {
            transform: rotateY(0deg) rotateX(0deg);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 42px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #1d1d1f;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .hero-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 60px;
                text-align: center;
            }

            .lang-switch {
                position: fixed;
                top: 20px;
                right: 20px;
            }

            .lang-selector {
                font-size: 13px;
                padding: 8px 36px 8px 14px;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                font-size: 1.1rem;
            }

            .phone-mockup {
                max-width: 300px;
                transform: none;
            }

            .phone-mockup:hover {
                transform: none;
            }

            .hero {
                padding: 40px 20px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 30px;
            }

            .app-store-button {
                padding: 12px 24px;
                font-size: 1rem;
            }

            .phone-mockup {
                max-width: 260px;
            }
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <select class="lang-selector" id="langSelector">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="ru">Русский</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
            <option value="it">Italiano</option>
            <option value="id">Indonesia</option>
            <option value="ja">日本語</option>
            <option value="zh">简体中文</option>
            <option value="th">ไทย</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title" data-i18n="hero-title">습관이 기적이 되는 순간</h1>
                <p class="hero-subtitle" data-i18n="hero-subtitle">
                    HabitFund로 당신의 좋은 습관을 사회적 가치(Impact)로 측정하고, 
                    후원의 기록을 SNS에 멋지게 공유하세요.
                </p>
                <a href="https://apps.apple.com/app/habit-fund/id6740895553" class="app-store-button" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 384 512" fill="currentColor">
                        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
                    </svg>
                    App Store에서 다운로드
                </a>
            </div>

            <div class="hero-video-container">
                <div class="phone-mockup">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <video 
                            class="hero-video" 
                            autoplay 
                            muted 
                            loop 
                            playsinline
                        >
                            <source src="assets/habitfund_preview_part-1.mov" type="video/quicktime">
                            <!-- 브라우저 호환성을 위한 대체 메시지 -->
                            동영상을 재생할 수 없습니다. 최신 브라우저를 사용해주세요.
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const translations = {
            ko: {
                'hero-title': 'HabitFund : 성장이 사회적 가치를 만나는 곳.',
                'hero-subtitle': 'HabitFund는 매일매일의 루틴이 핵심적인 정체성으로 자리 잡을 수 있도록 돕습니다. 습관에 가치를 부여하고 이를 쌓아가면서 자기계발을 하고 나눔의 힘을 통해 마음의 안정을 동시에 실현하는 특별한 여정을 선사합니다.'
            },
            en: {
                'hero-title': 'HabitFund: Where Personal Growth Meets Social Value.',
                'hero-subtitle': 'HabitFund helps you internalize daily routines until they become a core part of your identity. By assigning tangible value to your habits and accumulating them, we empower your path to both self-improvement and mental well-being through the power of giving.'
            },
            de: {
                'hero-title': 'HabitFund: Wo persönliches Wachstum auf sozialen Wert trifft.',
                'hero-subtitle': 'HabitFund hilft Ihnen dabei, tägliche Routinen zu verinnerlichen, bis sie zu einem festen Bestandteil Ihrer Identität werden. Indem Sie Ihren Gewohnheiten einen greifbaren Wert zuweisen, ebnen wir den Weg für Ihre persönliche Weiterentwicklung und Ihr geistiges Wohlbefinden – unterstützt durch die Kraft, zum gesellschaftlichen Wachstum beizutragen.'
            },
            ru: {
                'hero-title': 'HabitFund: Где личностный рост встречает социальную ценность.',
                'hero-subtitle': 'HabitFund помогает закрепить ежедневные привычки как часть вашей личности. Придавая ценность каждому шагу, мы поддерживаем ваш путь к саморазвитию и внутреннему спокойствию через помощь обществу.'
            },
            es: {
                'hero-title': 'HabitFund: Donde el crecimiento personal se une al valor social.',
                'hero-subtitle': 'HabitFund te ayuda a interiorizar tus rutinas diarias hasta que se conviertan en una parte esencial de tu identidad. Al asignar un valor tangible a tus hábitos y acumularlos, potenciamos tu camino hacia la mejora personal y el bienestar mental a través del poder de contribuir al crecimiento de la sociedad.'
            },
            ar: {
                'hero-title': 'HabitFund: حيث يلتقي النمو الشخصي بالقيمة الاجتماعية.',
                'hero-subtitle': 'يساعدك HabitFund على تبني العادات اليومية حتى تصبح جزءاً أساسياً من هويتك. من خلال إعطاء قيمة ملموسة لعاداتك، نمهد لك الطريق نحو تطوير الذات والراحة النفسية، عبر قوة المساهمة في نمو المجتمع.'
            },
            it: {
                'hero-title': 'HabitFund: Dove la crescita personale incontra il valore sociale.',
                'hero-subtitle': 'HabitFund ti aiuta a interiorizzare le tue routine quotidiane fino a farle diventare parte integrante della tua identità. Dando un valore tangibile alle tue abitudini e accumulandole, promuoviamo il tuo percorso di miglioramento personale e benessere mentale attraverso il potere del sostegno alla crescita comune.'
            },
            id: {
                'hero-title': 'HabitFund: Tempat pertumbuhan pribadi bertemu kontribusi sosial.',
                'hero-subtitle': 'HabitFund membantu Anda menanamkan rutinitas harian hingga menjadi bagian inti dari identitas Anda. Dengan memberikan nilai nyata pada setiap kebiasaan, kami mendukung perjalanan pengembangan diri dan ketenangan batin Anda melalui kekuatan untuk berkontribusi pada kemajuan masyarakat.'
            },
            ja: {
                'hero-title': 'HabitFund：個人の成長が社会の成長に繋がる場所。',
                'hero-subtitle': 'HabitFundは、日々のルーチンをあなた自身のアイデンティティとして定着させるためのパートナーです。習慣に形ある価値を与え、それを積み重ねていくことで、自己啓発だけでなく、「支援」という形で社会の発展に貢献し、心の安らぎを同時に実現する特別な体験をお届けします。'
            },
            zh: {
                'hero-title': 'HabitFund：让个人成长与社会价值在此交汇。',
                'hero-subtitle': 'HabitFund 致力于帮助您将每日习惯内化为核心自我认同的一部分。通过为习惯赋予有形价值并不断积累，您不仅能在自我提升中获得成就感，还能通过"社会支持"的力量，在助力社会成长的同时，实现内心的平静与平衡。'
            },
            th: {
                'hero-title': 'HabitFund: พื้นที่ที่การเติบโตส่วนบุคคลพบกับคุณค่าทางสังคม',
                'hero-subtitle': 'HabitFund ช่วยให้กิจวัตรประจำวันกลายเป็นตัวตนของคุณ มอบคุณค่าให้กับนิสัยของคุณเพื่อการพัฒนาตนเองและความสงบทางจิตใจ ผ่านพลังแห่งการแบ่งปันเพื่อสังคม'
            },
            fr: {
                'hero-title': 'HabitFund : Là où l\'épanouissement personnel rencontre la valeur sociale.',
                'hero-subtitle': 'HabitFund vous aide à intérioriser vos routines quotidiennes jusqu\'à ce qu\'elles deviennent une partie intégrante de votre identité. En attribuant une valeur tangible à vos habitudes, nous facilitons votre chemin vers le développement personnel et le bien-être mental, tout en vous donnant le pouvoir de soutenir la croissance de la société.'
            }
        };

        // 초기 언어 설정 (브라우저 언어 감지 또는 로컬 스토리지)
        const getInitialLang = () => {
            const savedLang = localStorage.getItem('habitfund-lang');
            if (savedLang) return savedLang;
            
            const browserLang = navigator.language.toLowerCase();
            return browserLang.startsWith('ko') ? 'ko' : 'en';
        };

        let currentLang = getInitialLang();

        // 언어 변경 함수
        const setLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('habitfund-lang', lang);
            
            // 모든 번역 가능한 요소 업데이트
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
            
            // 아랍어의 경우 RTL 설정
            const heroContent = document.querySelector('.hero-content');
            if (lang === 'ar') {
                heroContent.setAttribute('dir', 'rtl');
            } else {
                heroContent.removeAttribute('dir');
            }
            
            // 셀렉터 값 업데이트
            document.getElementById('langSelector').value = lang;
        };

        // 언어 셀렉터 이벤트
        document.getElementById('langSelector').addEventListener('change', (e) => {
            setLanguage(e.target.value);
        });

        // 초기 언어 적용
        setLanguage(currentLang);
    </script>
</body>
</html>
