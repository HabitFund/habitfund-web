<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HabitFund 커뮤니티에서 등록한 후원처 목록을 확인하세요">
    <meta property="og:title" content="등록된 후원처 - HabitFund">
    <meta property="og:description" content="커뮤니티에서 등록한 후원처를 검색하고 확인하세요">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://habitfund.app/contributors.html">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/logo.png">
    <title>등록된 후원처 - HabitFund</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WS6YKEYKEH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WS6YKEYKEH');
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #1d1d1f;
            background: #f5f7fa;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .header-back {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .header-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-selector {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 40px 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .lang-selector:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .lang-selector option {
            background: #1d1d1f;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .country-filter {
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .country-filter:hover,
        .country-filter:focus {
            border-color: #667eea;
        }

        .results-info {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            color: #64748b;
            font-size: 0.95rem;
        }

        .contributors-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .contributor-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contributor-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .contributor-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .contributor-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1d1d1f;
            flex: 1;
        }

        .contributor-flag {
            width: 32px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
        }

        .contributor-category {
            display: inline-block;
            padding: 4px 12px;
            background: #f1f5f9;
            color: #64748b;
            font-size: 0.85rem;
            border-radius: 20px;
            font-weight: 500;
        }

        .contributor-desc {
            color: #4a5568;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .contributor-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.8rem;
            border-radius: 12px;
            font-weight: 500;
        }

        .contributor-url {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
            transition: color 0.3s ease;
        }

        .contributor-url:hover {
            color: #764ba2;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 1.1rem;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .no-results h2 {
            font-size: 1.5rem;
            color: #334155;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header-back {
                position: static;
                transform: none;
                justify-content: center;
                margin-bottom: 16px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .contributors-grid {
                grid-template-columns: 1fr;
            }
        }

        [dir="rtl"] {
            direction: rtl;
        }

        [dir="rtl"] .search-icon {
            right: auto;
            left: 16px;
        }

        [dir="rtl"] .search-box input {
            padding: 14px 16px 14px 48px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="header-back">
            <span>←</span>
            <span>Home</span>
        </a>
        <div class="lang-switch">
            <select class="lang-selector" id="langSelector">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="ru">Русский</option>
                <option value="es">Español</option>
                <option value="ar">العربية</option>
                <option value="it">Italiano</option>
                <option value="id">Indonesia</option>
                <option value="ja">日本語</option>
                <option value="zh">简体中文</option>
                <option value="th">ไทย</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <h1 data-i18n="contributors-page-title">등록된 후원처 목록</h1>
        <p data-i18n="contributors-page-subtitle">커뮤니티에서 등록한 후원처를 확인하고 검색해보세요</p>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" data-i18n-placeholder="search-placeholder" placeholder="후원처 이름 또는 태그로 검색...">
            <span class="search-icon">🔍</span>
        </div>
        <select class="country-filter" id="countryFilter">
            <option value="" data-i18n="all-countries">모든 국가</option>
        </select>
    </div>

    <div class="results-info" id="resultsInfo">
        <span data-i18n="loading">로딩 중...</span>
    </div>

    <div class="contributors-grid" id="contributorsGrid">
        <div class="loading" data-i18n="loading">로딩 중...</div>
    </div>

    <script src="assets/translations.js"></script>
    <script>
        const DATA_BASE_URL = 'https://raw.githubusercontent.com/HabitFund/habitfund-data/main/';
        
        let allContributors = [];
        let filteredContributors = [];
        let countriesData = [];
        let translations = {};
        let currentLang = 'ko';

        // 초기화
        async function init() {
            currentLang = getInitialLang();
            await loadTranslations();
            await loadData();
            setupEventListeners();
            setLanguage(currentLang);
            document.getElementById('langSelector').value = currentLang;
        }

        // 번역 데이터 로드
        async function loadTranslations() {
            try {
                const response = await fetch('assets/translations.json');
                translations = await response.json();
            } catch (error) {
                console.error('Failed to load translations:', error);
            }
        }

        // 데이터 로드
        async function loadData() {
            try {
                // index.json 로드
                const indexResponse = await fetch(DATA_BASE_URL + 'contributors/index.json');
                countriesData = await indexResponse.json();

                // 국가 필터 옵션 추가
                const countryFilter = document.getElementById('countryFilter');
                countriesData.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country.code;
                    option.textContent = `${country.country} (${country.count})`;
                    countryFilter.appendChild(option);
                });

                // 모든 국가의 데이터 로드
                const promises = countriesData.map(async (country) => {
                    try {
                        const response = await fetch(DATA_BASE_URL + country.path);
                        const data = await response.json();
                        return data.map(item => ({ ...item, countryData: country }));
                    } catch (error) {
                        console.error(`Failed to load ${country.country} data:`, error);
                        return [];
                    }
                });

                const results = await Promise.all(promises);
                allContributors = results.flat();
                filteredContributors = [...allContributors];
                
                renderContributors();
            } catch (error) {
                console.error('Failed to load data:', error);
                showError();
            }
        }

        // 이벤트 리스너 설정
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('countryFilter').addEventListener('change', handleFilter);
            document.getElementById('langSelector').addEventListener('change', (e) => {
                setLanguage(e.target.value);
            });
        }

        // 검색 처리
        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const countryCode = document.getElementById('countryFilter').value;

            filteredContributors = allContributors.filter(contributor => {
                const matchesSearch = !searchTerm || 
                    contributor.name.toLowerCase().includes(searchTerm) ||
                    contributor.desc.toLowerCase().includes(searchTerm) ||
                    contributor.tags.some(tag => tag.toLowerCase().includes(searchTerm));
                
                const matchesCountry = !countryCode || contributor.country === countryCode.toUpperCase();

                return matchesSearch && matchesCountry;
            });

            renderContributors();
        }

        // 필터 처리
        function handleFilter() {
            handleSearch();
        }

        // 후원처 렌더링
        function renderContributors() {
            const grid = document.getElementById('contributorsGrid');
            const resultsInfo = document.getElementById('resultsInfo');

            if (filteredContributors.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">😔</div>
                        <h2 data-i18n="no-results">검색 결과가 없습니다</h2>
                    </div>
                `;
                resultsInfo.innerHTML = `<span data-i18n="no-results">검색 결과가 없습니다</span>`;
                translatePage();
                return;
            }

            const totalText = translations[currentLang]?.['total-contributors'] || 'Total %count organizations';
            resultsInfo.textContent = totalText.replace('%count', filteredContributors.length);

            grid.innerHTML = filteredContributors.map(contributor => {
                const categoryKey = `category-${contributor.category}`;
                const categoryText = translations[currentLang]?.[categoryKey] || contributor.category;
                
                return `
                    <div class="contributor-card">
                        <div class="contributor-header">
                            <div class="contributor-name">${contributor.name}</div>
                            ${contributor.countryData ? `<img src="${contributor.countryData.flag}" alt="${contributor.countryData.country}" class="contributor-flag">` : ''}
                        </div>
                        <div class="contributor-category">${categoryText}</div>
                        <div class="contributor-desc">${contributor.desc}</div>
                        ${contributor.tags && contributor.tags.length > 0 ? `
                            <div class="contributor-tags">
                                ${contributor.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${contributor.url ? `
                            <a href="${contributor.url}" target="_blank" rel="noopener noreferrer" class="contributor-url">
                                <span data-i18n="visit-website">웹사이트 방문</span>
                                <span>→</span>
                            </a>
                        ` : ''}
                    </div>
                `;
            }).join('');

            translatePage();
        }

        // 에러 표시
        function showError() {
            const grid = document.getElementById('contributorsGrid');
            grid.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">⚠️</div>
                    <h2>Failed to load data</h2>
                    <p>Please try again later.</p>
                </div>
            `;
        }

        // 언어 설정
        function getInitialLang() {
            const savedLang = localStorage.getItem('habitfund-lang');
            if (savedLang) return savedLang;
            
            const browserLang = navigator.language.toLowerCase();
            return browserLang.startsWith('ko') ? 'ko' : 'en';
        }

        function setLanguage(lang) {
            if (!translations[lang]) return;
            
            currentLang = lang;
            localStorage.setItem('habitfund-lang', lang);
            document.documentElement.setAttribute('lang', lang);
            
            // RTL 언어 처리
            if (lang === 'ar') {
                document.documentElement.setAttribute('dir', 'rtl');
            } else {
                document.documentElement.removeAttribute('dir');
            }

            translatePage();
            renderContributors(); // 카테고리 번역을 위해 다시 렌더링
        }

        function translatePage() {
            if (!translations[currentLang]) return;

            // data-i18n 속성이 있는 모든 요소 번역
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    element.textContent = translations[currentLang][key];
                }
            });

            // placeholder 번역
            document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
                const key = element.getAttribute('data-i18n-placeholder');
                if (translations[currentLang][key]) {
                    element.placeholder = translations[currentLang][key];
                }
            });

            // 타이틀 업데이트
            if (translations[currentLang]['contributors-page-title']) {
                document.title = translations[currentLang]['contributors-page-title'] + ' - HabitFund';
            }
        }

        // 초기화 실행
        init();
    </script>
</body>
</html>
